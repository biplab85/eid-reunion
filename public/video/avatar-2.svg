<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="শুভেচ্ছা অ্যাভাটার">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f4636"/>
      <stop offset="0.5" stop-color="#0a241b"/>
      <stop offset="1" stop-color="#06140f"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0dca2"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#9a7a2e"/>
    </linearGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0" stop-color="#7c2d2d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c2d2d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots2" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#c9a24b" opacity="0.16"/>
    </pattern>
    <clipPath id="clip2"><circle cx="400" cy="238" r="72"/></clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg2)"/>
  <rect width="800" height="500" fill="url(#dots2)"/>
  <rect width="800" height="500" fill="url(#halo2)"/>

  <!-- corner flourishes -->
  <g stroke="url(#gold2)" stroke-width="2" fill="none" opacity="0.55">
    <path d="M44 70 q0 -24 24 -24 l46 0"/>
    <path d="M756 70 q0 -24 -24 -24 l-46 0"/>
    <path d="M44 430 q0 24 24 24 l46 0"/>
    <path d="M756 430 q0 24 -24 24 l-46 0"/>
  </g>

  <!-- twin lanterns -->
  <g fill="url(#gold2)" opacity="0.9">
    <g transform="translate(150 110)"><rect x="-7" y="0" width="14" height="34" rx="7"/><path d="M-9 -10 h18 v-7 a9 9 0 0 0 -18 0 z"/></g>
    <g transform="translate(650 110)"><rect x="-7" y="0" width="14" height="34" rx="7"/><path d="M-9 -10 h18 v-7 a9 9 0 0 0 -18 0 z"/></g>
  </g>

  <!-- crescent -->
  <g transform="translate(400 96)">
    <path d="M0 -24 a24 24 0 1 0 16 41 a19 19 0 1 1 -16 -41 z" fill="url(#gold2)"/>
  </g>

  <!-- avatar ring -->
  <circle cx="400" cy="238" r="84" fill="none" stroke="url(#gold2)" stroke-width="5"/>
  <circle cx="400" cy="238" r="72" fill="#091c15"/>

  <!-- silhouette -->
  <g clip-path="url(#clip2)">
    <circle cx="400" cy="220" r="29" fill="url(#gold2)"/>
    <path d="M344 322 a56 56 0 0 1 112 0 z" fill="url(#gold2)"/>
  </g>

  <!-- heart/greeting badge -->
  <g transform="translate(400 322)">
    <circle r="19" fill="url(#gold2)" stroke="#091c15" stroke-width="3"/>
    <path d="M0 8 C -10 0 -10 -9 -4 -9 C -1 -9 0 -6 0 -6 C 0 -6 1 -9 4 -9 C 10 -9 10 0 0 8 Z" fill="#091c15"/>
  </g>
</svg>
